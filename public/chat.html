<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retayn | Intelligent Memory Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body { font-family: 'Inter', sans-serif; }
            h1, h2, h3, strong { font-family: 'Outfit', sans-serif; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-[#0A0A0C] text-white h-screen overflow-hidden flex flex-col md:flex-row">
    <!-- Sidebar Overlay (Mobile) -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden transition-opacity duration-300 opacity-0"></div>

    <!-- Sidebar: Memory Bank -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#16161D] border-r border-white/10 flex flex-col transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0">
        <div class="p-6 border-b border-white/10">
            <h1 class="text-2xl font-bold bg-gradient-to-br from-white to-[#3b82f6] bg-clip-text text-transparent">Retayn Bank</h1>
            <p class="text-[10px] text-white/40 uppercase tracking-widest mt-1">Long-term Memory Store</p>
        </div>
        <div id="memory-list" class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-3">
            <!-- Memories load here -->
            <div class="text-white/20 text-xs text-center mt-10 text-balance px-4">Initializing memory bank...</div>
        </div>
        <div class="p-4 border-t border-white/5 text-[10px] text-white/30 text-center uppercase tracking-tighter">
            Powered by <span class="text-[#3b82f6]/70 font-bold">Retayn AI</span>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col relative min-w-0 bg-[#0A0A0C]">
        <!-- Header -->
        <header class="h-16 border-b border-white/10 flex items-center justify-between px-6 bg-[#0A0A0C]/80 backdrop-blur-xl sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button id="toggle-bank" class="md:hidden p-2 -ml-2 bg-white/5 border border-white/10 rounded-lg text-white/70 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-[#10b981] rounded-full shadow-[0_0_8px_#10b981]"></span>
                    <strong class="text-sm tracking-tight">Retayn Bot</strong>
                </div>
            </div>
            <button id="clear-btn" class="text-[10px] text-white/40 hover:text-white/70 transition-colors uppercase tracking-widest font-semibold border-b border-transparent hover:border-white/20 pb-0.5">Clear History</button>
        </header>

        <!-- Chat Messages -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-6 md:p-10 space-y-6 custom-scrollbar">
            <!-- Messages load here -->
        </div>

        <!-- Input Area -->
        <div class="p-4 md:p-8 bg-gradient-to-t from-[#0A0A0C] via-[#0A0A0C]/80 to-transparent">
            <form id="chat-form" class="max-w-3xl mx-auto flex gap-3 bg-[#16161D] p-1.5 md:p-2 rounded-2xl border border-white/10 shadow-2xl focus-within:border-[#3b82f6]/50 transition-all">
                <input type="text" id="user-input" placeholder="Tell me something or ask me anything..." autocomplete="off" class="flex-1 bg-transparent border-none text-white px-4 md:px-5 py-3 outline-none placeholder:text-white/20 text-sm md:text-base">
                <button type="submit" id="send-btn" class="bg-[#3b82f6] hover:bg-[#2563eb] text-white px-6 md:px-8 py-3 rounded-xl font-semibold transition-all active:scale-95 disabled:opacity-50 disabled:scale-100 flex items-center justify-center min-w-[100px] text-sm md:text-base">Send</button>
            </form>
        </div>
    </div>

    <script>
        // Fix hardcoded localhost for production
        const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
            ? 'http://localhost:3000/v1' 
            : window.location.origin + '/v1';
            
        const API_KEY = 'retayn_test_key_123'; 

        // Persist User ID
        if (!localStorage.getItem('retayn_user_id')) {
            localStorage.setItem('retayn_user_id', 'demo_user_' + Math.random().toString(36).substr(2, 9));
        }
        const USER_ID = localStorage.getItem('retayn_user_id');

        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatMessages = document.getElementById('chat-messages');
        const memoryList = document.getElementById('memory-list');
        const sendBtn = document.getElementById('send-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const toggleBtn = document.getElementById('toggle-bank');

        // Mobile Toggle Logic
        const toggleSidebar = (state) => {
            if (state) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        };

        toggleBtn.onclick = () => toggleSidebar(true);
        overlay.onclick = () => toggleSidebar(false);

        // Initial Load
        addMessage("Hello! I'm Retayn. I can remember your preferences and facts across sessions. Try telling me something about yourself!", 'ai');
        fetchMemories();

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';
            setLoading(true);

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-KEY': API_KEY
                    },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        message: message
                    })
                });

                const data = await res.json();
                
                if (data.response) {
                    addMessage(data.response, 'ai');
                }

                if (data.stored) {
                    setTimeout(fetchMemories, 500);
                }

            } catch (err) {
                console.error('Chat Error:', err);
                addMessage("❌ Connection Error. Retayn could not be reached. Checking: " + API_URL + ". Details: " + (err.message || 'Server 500'), 'ai');
            } finally {
                setLoading(false);
            }
        });

        async function fetchMemories() {
            try {
                const res = await fetch(`${API_URL}/memories/${USER_ID}`, {
                    headers: { 'X-API-KEY': API_KEY }
                });
                if (!res.ok) throw new Error("Failed to fetch memories");
                const memories = await res.json();
                updateMemoryPanel(memories);
            } catch (err) {
                console.error('Fetch Error:', err);
                memoryList.innerHTML = `<div class="text-white/20 text-xs text-center mt-10 italic">Connection issues reaching memory bank...<br><span class="opacity-50">${err.message}</span></div>`;
            }
        }

        function updateMemoryPanel(memories) {
            if (!memories || memories.length === 0) {
                memoryList.innerHTML = '<div class="text-white/20 text-sm text-center mt-10 italic px-4">No memories yet. Tell me a fact!</div>';
                return;
            }

            memoryList.innerHTML = '';
            memories.forEach(mem => {
                const card = document.createElement('div');
                card.className = 'bg-white/5 border border-white/10 rounded-xl p-4 transition-all hover:border-[#3b82f6]/50 hover:bg-[#3b82f6]/5 group';
                card.innerHTML = `
                    <div class="text-sm leading-relaxed">${mem.content}</div>
                    <div class="text-[10px] text-white/30 mt-3 flex justify-between group-hover:text-[#3b82f6]/50 transition-colors uppercase tracking-tight font-medium">
                        <span>Stored Fact</span>
                        <span>${new Date(mem.created_at).toLocaleDateString()}</span>
                    </div>
                `;
                memoryList.appendChild(card);
            });
        }

        function addMessage(text, side) {
            const div = document.createElement('div');
            const isAi = side === 'ai';
            div.className = `flex ${isAi ? 'justify-start' : 'justify-end'} opacity-0 translate-y-2 transition-all duration-300 ease-out`;
            
            div.innerHTML = `
                <div class="max-w-[85%] md:max-w-[75%] px-5 py-3.5 rounded-2xl text-sm md:text-[15px] leading-relaxed relative ${
                    isAi 
                    ? 'bg-[#16161D] text-white border border-white/10 rounded-bl-none' 
                    : 'bg-[#3b82f6] text-white rounded-br-none shadow-lg shadow-[#3b82f6]/20'
                }">
                    ${text}
                </div>
            `;
            
            chatMessages.appendChild(div);
            // Trigger animation
            setTimeout(() => {
                div.classList.remove('opacity-0', 'translate-y-2');
            }, 50);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            sendBtn.innerHTML = isLoading ? '<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>' : 'Send';
        }

        document.getElementById('clear-btn').onclick = () => {
            if(confirm("Clear local chat history? This won't delete stored memories.")) {
                chatMessages.innerHTML = '';
                addMessage("History cleared locally. Memories in the bank remain safe!", 'ai');
            }
        };
    </script>
</body>
</html>
